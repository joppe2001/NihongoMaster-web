<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 512px; height: 512px; overflow: hidden; background: transparent; }
      body {
        background: #b8a9fa;
        border: 28px solid #000;
        border-radius: 108px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .mark {
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 900;
        font-size: 360px;
        letter-spacing: -0.04em;
        color: #000;
        line-height: 1;
        margin-top: -20px;
      }
    </style>
  </head>
  <body>
    <span class="mark">日</span>
  </body>
</html>

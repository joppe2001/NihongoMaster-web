<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nihongo Master OG image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@700&family=Noto+Sans+JP:wght@900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #fffdf5;
        --ink: #000000;
        --accent: #b8a9fa;
        --accent-2: #ffd23f;
        --accent-3: #ff90e8;
        --success: #88d498;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        background: var(--paper);
        overflow: hidden;
        position: relative;
        font-family: 'Syne', sans-serif;
        color: var(--ink);
      }
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 20px,
          rgba(0, 0, 0, 0.05) 20px,
          rgba(0, 0, 0, 0.05) 24px
        );
        pointer-events: none;
      }
      .floating {
        position: absolute;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 900;
        color: var(--ink);
        opacity: 0.12;
        pointer-events: none;
        user-select: none;
      }
      .float-1 { top: 38px; left: 32px; font-size: 140px; color: var(--accent); transform: rotate(-8deg); }
      .float-2 { top: 24px; right: 92px; font-size: 120px; color: var(--accent-2); transform: rotate(12deg); }
      .float-3 { bottom: 46px; left: 90px; font-size: 110px; color: var(--accent-3); transform: rotate(-6deg); }
      .float-4 { bottom: 30px; right: 60px; font-size: 160px; color: var(--success); transform: rotate(10deg); }

      .corner {
        position: absolute;
        width: 44px;
        height: 44px;
      }
      .corner::before,
      .corner::after {
        content: '';
        position: absolute;
        background: var(--ink);
      }
      .corner::before { width: 44px; height: 4px; top: 0; left: 0; }
      .corner::after { width: 4px; height: 44px; top: 0; left: 0; }
      .corner.tr { top: 28px; right: 28px; transform: rotate(90deg); }
      .corner.br { bottom: 28px; right: 28px; transform: rotate(180deg); }
      .corner.bl { bottom: 28px; left: 28px; transform: rotate(270deg); }
      .corner.tl { top: 28px; left: 28px; }

      .center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 2;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--accent-2);
        border: 3px solid var(--ink);
        border-radius: 999px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        letter-spacing: 0.18em;
        font-size: 16px;
        text-transform: uppercase;
        box-shadow: 4px 4px 0 0 var(--ink);
      }

      .kanji {
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 900;
        font-size: 220px;
        line-height: 0.95;
        letter-spacing: -0.04em;
        text-shadow: 10px 10px 0 var(--accent-2);
      }

      .stamp {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 84px;
        letter-spacing: -0.03em;
        padding: 6px 28px;
        background: var(--ink);
        color: var(--paper);
        border: 3px solid var(--ink);
        border-radius: 14px;
        box-shadow: 10px 10px 0 0 var(--accent);
        margin-top: 8px;
      }

      .tagline {
        margin-top: 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
        z-index: 3;
      }
      .domain {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 20px;
        letter-spacing: 0.1em;
        padding: 10px 18px;
        background: var(--paper);
        border: 3px solid var(--ink);
        border-radius: 999px;
        box-shadow: 4px 4px 0 0 var(--ink);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }
      .chip-item {
        padding: 8px 14px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        border: 3px solid var(--ink);
        border-radius: 999px;
        box-shadow: 3px 3px 0 0 var(--ink);
      }
      .chip-item.coral { background: var(--accent-3); }
      .chip-item.green { background: var(--success); }
      .chip-item.blue { background: var(--accent); }
    </style>
  </head>
  <body>
    <div class="floating float-1">あ</div>
    <div class="floating float-2">日</div>
    <div class="floating float-3">漢</div>
    <div class="floating float-4">語</div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="center">
      <div class="pill">N5 → N1 · Built for Japanese</div>
      <div class="kanji">日本語</div>
      <div class="stamp">Master</div>
      <div class="tagline">Learn Japanese · Your Way</div>
    </div>

    <div class="footer">
      <div class="domain">nihongomaster.org</div>
      <div class="chip">
        <span class="chip-item blue">Journey</span>
        <span class="chip-item coral">JLPT</span>
        <span class="chip-item green">Offline</span>
      </div>
    </div>
  </body>
</html>
